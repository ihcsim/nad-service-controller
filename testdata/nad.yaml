apiVersion: v1
kind: Service
metadata:
  name: nginx-nad
  annotations:
    isim.dev/network: "macvlan"
spec:
  ports:
    - name: http
      port: 80
    - name: https
      port: 443
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-nad
  labels:
    app: nginx-nad
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-nad
  template:
    metadata:
      annotations:
        k8s.v1.cni.cncf.io/networks: |
          [
            {
              "name": "macvlan",
              "default-route": ["192.168.2.1"]
            }
          ]
      labels:
        app: nginx-nad
    spec:
      containers:
        - name: myapp
          image: "nginx:latest"
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          ports:
            - containerPort: 80
              name: http
            - containerPort: 443
              name: https
